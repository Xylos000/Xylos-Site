<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYLOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --violet: #8b5cf6;
            --magenta: #d946ef;
            --cyan: #06b6d4;
            --rose: #f43f5e;
            --amber: #f59e0b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --dark: #0a0a0f;
            --panel: rgba(15, 15, 25, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ========== BACKGROUND ========== */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .bg-video-container video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: var(--dark);
            -webkit-appearance: none;
            appearance: none;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.75);
            z-index: -1;
        }

        /* ========== CANVAS EFFECTS ========== */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* ========== MAIN CARD ========== */
        .main-card {
            position: relative;
            width: 90%;
            max-width: 520px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            box-shadow:
                0 0 60px rgba(139, 92, 246, 0.08),
                0 0 120px rgba(217, 70, 239, 0.04),
                inset 0 0 60px rgba(139, 92, 246, 0.03);
            animation: cardFloat 6s ease-in-out infinite;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(217, 70, 239, 0.2), rgba(6, 182, 212, 0.1));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .main-card:hover::before {
            opacity: 1;
        }

        .main-card:hover {
            box-shadow:
                0 0 80px rgba(139, 92, 246, 0.15),
                0 0 160px rgba(217, 70, 239, 0.08),
                inset 0 0 80px rgba(139, 92, 246, 0.05);
            transform: translateY(-4px) scale(1.01);
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* ========== PFP ========== */
        .pfp-container {
            position: relative;
            display: inline-block;
            margin-bottom: 28px;
        }

        .pfp {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(139, 92, 246, 0.4);
            box-shadow:
                0 0 30px rgba(139, 92, 246, 0.4),
                0 0 60px rgba(217, 70, 239, 0.2),
                inset 0 0 20px rgba(139, 92, 246, 0.1);
            transition: all 0.4s ease;
        }

        .pfp-container:hover .pfp {
            box-shadow:
                0 0 50px rgba(139, 92, 246, 0.6),
                0 0 100px rgba(217, 70, 239, 0.3),
                inset 0 0 30px rgba(139, 92, 246, 0.2);
            transform: scale(1.05);
        }

        .pfp-ring {
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--violet);
            border-right-color: var(--magenta);
            animation: pfpSpin 4s linear infinite;
        }

        .pfp-ring-2 {
            position: absolute;
            top: -14px;
            left: -14px;
            right: -14px;
            bottom: -14px;
            border-radius: 50%;
            border: 1px solid transparent;
            border-bottom-color: var(--cyan);
            border-left-color: var(--rose);
            animation: pfpSpin 6s linear infinite reverse;
        }

        @keyframes pfpSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========== NAME & TAGLINE ========== */
        .name {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 8px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text), var(--violet), var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            animation: nameGlow 3s ease-in-out infinite alternate;
        }

        @keyframes nameGlow {
            0% { filter: brightness(1) drop-shadow(0 0 10px rgba(139, 92, 246, 0.3)); }
            100% { filter: brightness(1.1) drop-shadow(0 0 20px rgba(217, 70, 239, 0.4)); }
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 4px;
            margin-bottom: 32px;
            text-transform: lowercase;
        }

        /* ========== DIVIDER ========== */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--violet), var(--magenta), transparent);
            margin: 0 auto 28px;
            border-radius: 1px;
            position: relative;
        }

        .divider::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--magenta);
            box-shadow: 0 0 10px var(--magenta);
            animation: dividerPulse 2s ease-in-out infinite;
        }

        @keyframes dividerPulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.3); }
        }

        /* ========== ABOUT ME ========== */
        .about-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--violet);
            letter-spacing: 3px;
            text-transform: lowercase;
            margin-bottom: 12px;
        }

        .about-text {
            font-size: 0.95rem;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 28px;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ========== SOCIAL LINKS ========== */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(15, 15, 25, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            color: var(--muted);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .social-link:hover {
            border-color: var(--violet);
            color: var(--text);
            background: rgba(139, 92, 246, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.2);
        }

        .social-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }



        /* ========== MUSIC CONTROLS ========== */
        .music-toggle {
            display: none;
        }

        /* ========== AUDIO VISUALIZER BARS ========== */
        .visualizer {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 3px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 3px;
            background: linear-gradient(to top, var(--violet), var(--magenta));
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        /* ========== FOOTER ========== */
        .footer-text {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: rgba(148, 163, 184, 0.3);
            letter-spacing: 6px;
            text-transform: lowercase;
            z-index: 50;
        }

        /* ========== PARTICLE EFFECTS ========== */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            z-index: 0;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(100px) scale(1);
                opacity: 0;
            }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .main-card {
                padding: 36px 24px;
                width: 95%;
            }
            .name {
                font-size: 2.4rem;
                letter-spacing: 5px;
            }
            .tagline {
                font-size: 0.75rem;
                letter-spacing: 2px;
            }
            .social-links {
                flex-direction: column;
                align-items: center;
            }
            .social-link {
                width: 100%;
                max-width: 200px;
                justify-content: center;
            }
        }

        /* ========== SCROLL TEXT ANIMATION ========== */
        .glitch-text {
            position: relative;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        .glitch-text:hover::before {
            animation: glitch1 0.3s ease;
            color: var(--cyan);
            opacity: 0.8;
        }

        .glitch-text:hover::after {
            animation: glitch2 0.3s ease;
            color: var(--rose);
            opacity: 0.8;
        }

        @keyframes glitch1 {
            0% { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 0); }
            20% { clip-path: inset(60% 0 20% 0); transform: translate(2px, 0); }
            40% { clip-path: inset(40% 0 40% 0); transform: translate(-1px, 0); }
            60% { clip-path: inset(80% 0 10% 0); transform: translate(1px, 0); }
            80% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 0); }
            100% { clip-path: inset(50% 0 50% 0); transform: translate(0, 0); }
        }

        @keyframes glitch2 {
            0% { clip-path: inset(60% 0 20% 0); transform: translate(2px, 0); }
            20% { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 0); }
            40% { clip-path: inset(80% 0 10% 0); transform: translate(1px, 0); }
            60% { clip-path: inset(40% 0 40% 0); transform: translate(-1px, 0); }
            80% { clip-path: inset(10% 0 80% 0); transform: translate(2px, 0); }
            100% { clip-path: inset(50% 0 50% 0); transform: translate(0, 0); }
        }

        /* ========== TOOLTIP ========== */
        .tooltip {
            position: fixed;
            background: rgba(15, 15, 25, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            padding: 8px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .tooltip.show {
            opacity: 1;
        }
    </style>

    <script>
        // ========== CONFIG ==========
        const CONFIG = {
            name: "XYLOS",
            tagline: "developer // creator // gamer",
            pfp: "assets/pfp.jpg",
            aboutMe: "i build things for the web. i break things for fun. i game to unwind. this is my digital footprint.",
            bgVideo: "assets/bg.mp4",
            bgVideoPoster: "assets/bg-poster.jpg",
            bgMusic: "assets/music.mp3",
            musicVolume: 0.25,
            discord: "xylos000",
            roblox: "Xylos000",
            colors: {
                violet: "#8b5cf6",
                magenta: "#d946ef",
                cyan: "#06b6d4",
                rose: "#f43f5e",
                amber: "#f59e0b",
                text: "#e2e8f0",
                muted: "#94a3b8",
                dark: "#0a0a0f",
                panel: "rgba(15, 15, 25, 0.6)"
            }
        };

        // ========== CANVAS PARTICLE SYSTEM ==========
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouseX = 0, mouseY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.hue = Math.random() > 0.5 ? 260 : 300;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;

                // Mouse interaction
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    this.x -= dx * 0.02;
                    this.y -= dy * 0.02;
                }

                if (this.life <= 0 || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                const lifeRatio = this.life / this.maxLife;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity * lifeRatio})`;
                ctx.fill();
            }
        }

        // Create particles
        for (let i = 0; i < 80; i++) {
            particles.push(new Particle());
        }

        // Draw connecting lines
        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `hsla(270, 60%, 50%, ${0.1 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            drawConnections();
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // Mouse tracking
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // ========== FLOATING PARTICLES (DOM) ==========
        function createFloatingParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            const colors = ['#8b5cf6', '#d946ef', '#06b6d4', '#f43f5e'];
            particle.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                left: ${Math.random() * 100}vw;
                box-shadow: 0 0 ${size * 2}px currentColor;
                animation-duration: ${Math.random() * 10 + 8}s;
                animation-delay: ${Math.random() * 5}s;
                opacity: ${Math.random() * 0.4 + 0.1};
            `;
            document.body.appendChild(particle);

            setTimeout(() => particle.remove(), 20000);
        }

        setInterval(createFloatingParticle, 800);

        // ========== MUSIC CONTROLS ==========
        const bgMusic = document.getElementById('bgMusic');
        const visualizer = document.getElementById('visualizer');
        const bars = visualizer.querySelectorAll('.bar');

        bgMusic.volume = CONFIG.musicVolume;
        bgMusic.play().catch(() => {});
        visualizer.classList.add('active');

        // Visualizer animation (always running since music is always playing)
        setInterval(() => {
            bars.forEach(bar => {
                const height = Math.random() * 24 + 4;
                bar.style.height = height + 'px';
            });
        }, 100);



        // ========== TOOLTIP ==========
        const tooltip = document.getElementById('tooltip');
        document.querySelectorAll('[data-tooltip]').forEach(el => {
            el.addEventListener('mouseenter', (e) => {
                tooltip.textContent = e.target.dataset.tooltip;
                tooltip.classList.add('show');
            });
            el.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.clientX + 12 + 'px';
                tooltip.style.top = e.clientY - 30 + 'px';
            });
            el.addEventListener('mouseleave', () => {
                tooltip.classList.remove('show');
            });
        });

        // ========== GLITCH EFFECT ON HOVER ==========
        const nameEl = document.querySelector('.name');
        let glitchInterval;
        nameEl.addEventListener('mouseenter', () => {
            glitchInterval = setInterval(() => {
                const offset = (Math.random() - 0.5) * 4;
                nameEl.style.transform = `translateX(${offset}px)`;
                setTimeout(() => {
                    nameEl.style.transform = 'translateX(0)';
                }, 50);
            }, 200);
        });
        nameEl.addEventListener('mouseleave', () => {
            clearInterval(glitchInterval);
            nameEl.style.transform = 'translateX(0)';
        });

        // ========== TYPING EFFECT FOR ABOUT TEXT ==========
        const aboutText = document.querySelector('.about-text');
        const originalText = aboutText.textContent;
        aboutText.textContent = '';
        let charIndex = 0;

        function typeText() {
            if (charIndex < originalText.length) {
                aboutText.textContent += originalText.charAt(charIndex);
                charIndex++;
                setTimeout(typeText, 30);
            }
        }
        setTimeout(typeText, 800);

        // ========== PFP PARALLAX ==========
        const pfpContainer = document.querySelector('.pfp-container');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            pfpContainer.style.transform = `translate(${x}px, ${y}px)`;
        });

        // ========== CARD 3D TILT ==========
        const card = document.querySelector('.main-card');
        document.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            const rotateX = (y / rect.height) * -5;
            const rotateY = (x / rect.width) * 5;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-4px)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
        });

        // ========== SOCIAL LINK COPY ==========
        document.querySelectorAll('.social-link').forEach(link => {
            link.addEventListener('click', (e) => {
                if (!e.ctrlKey && !e.metaKey) {
                    e.preventDefault();
                    const text = link.textContent.trim();
                    navigator.clipboard.writeText(text).then(() => {
                        const original = link.innerHTML;
                        link.innerHTML = '<span style="color: var(--cyan);">Copied!</span>';
                        setTimeout(() => {
                            link.innerHTML = original;
                        }, 1500);
                    });
                }
            });
        });

        // ========== SCROLL REVEAL ==========
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        });

        document.querySelectorAll('.social-link').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            observer.observe(el);
        });

        // Reveal after a delay
        setTimeout(() => {
            document.querySelectorAll('.social-link').forEach((el, i) => {
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, i * 150);
            });
        }, 1200);

        // ========== AMBIENT GLOW AROUND CURSOR ==========
        const glow = document.createElement('div');
        glow.style.cssText = `
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
            transition: transform 0.1s ease;
        `;
        document.body.appendChild(glow);

        document.addEventListener('mousemove', (e) => {
            glow.style.left = (e.clientX - 150) + 'px';
            glow.style.top = (e.clientY - 150) + 'px';
        });
    </script>
</body>
</html>
